<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>

  <title>Liquid Arts | Login — Mobile Cocktail Bartending</title>
  <meta name="description"
    content="Login to Liquid Arts — access your event bookings, signature cocktail menus, and mixology dashboard.">
  <link class="favicon" rel="icon" href="/assets/fav.jpg" type="image/jpeg">
  <!-- Tailwind + Fonts + Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Lato:wght@300;400;700;900&display=swap"

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'theme-accent': '#F59E0B',
            'theme-accent-dark': '#D97706',
            'theme-accent-light': '#FCD34D',
            'dark-gray': '#0a0a0a',
            'light-peach': '#FFFFFF',
            white: '#FFFFFF'
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Lato"', 'system-ui', 'sans-serif'],
          },
          letterSpacing: {
            'widest-xl': '0.3em',
          }
        }
      }
    }

  <style>
    body {
      transition: background-color 0.3s, color 0.3s;
    }

    /* Enhanced scrollbar for dark & rtl */
    .hide-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .hide-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .hide-scrollbar::-webkit-scrollbar-thumb {
      background: #F59E0B;
      border-radius: 10px;
    }

    .hide-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: #F59E0B transparent;
    }

    @keyframes slowZoom {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.08);
      }
    }

    .slow-zoom {
      animation: slowZoom 28s ease-in-out infinite alternate;
    }

    @keyframes floatCocktail {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-8px) rotate(3deg);
      }
    }

    .float-cocktail {
      animation: floatCocktail 6s ease-in-out infinite;
    }

    .btn-shine {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .btn-shine::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-shine:hover::after {
      left: 100%;
    }

    @keyframes toastFade {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }

      15% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      85% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
      }
    }

    .toast-animation {
      animation: toastFade 2.5s ease forwards;
    }

    /* RTL overrides - full touch compatibility for 360px */
    [dir="rtl"] .rtl\:right-auto {
      right: auto;
    }

    [dir="rtl"] .rtl\:left-0 {
      left: 0;
    }

    [dir="rtl"] .rtl\:rotate-180 {
      transform: rotate(180deg);
    }

    [dir="rtl"] .me-2 {
      margin-left: 0.5rem;
      margin-right: 0;
    }

    [dir="rtl"] .ms-2 {
      margin-right: 0.5rem;
      margin-left: 0;
    }

    /* Fix autofill */
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px #f9f9f9 inset !important;
    }

    .dark input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important;
      -webkit-text-fill-color: #e5e5e5 !important;
    }

    /* Glass card with improved responsiveness */
    .glass-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
    }

    .dark .glass-card {
      background: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(2px);
    }

    /* Animated border */
    .animated-border {
      position: relative;
      background: linear-gradient(60deg, #F59E0B, #FCD34D, #F59E0B);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Fix for 360px touch & avoid overflow - EXTREME MOBILE OPTIMIZATION */
    @media (max-width: 400px) {

      .glass-card .p-6,
      .glass-card .p-8,
      .glass-card>div:last-child {
        padding-left: 1rem !important;
        padding-right: 1rem !important;
      }

      .social-login-btn i {
        font-size: 1rem;
      }

      .glass-card {
        border-radius: 1.5rem !important;
      }

      .rtl .glass-card {
        border-radius: 1.5rem !important;
      }

      /* Extra compact for 360px */
      .glass-card>div:last-child {
        padding-top: 0.5rem !important;
        padding-bottom: 0.5rem !important;
      }

      .glass-card .text-center.mb-4 {
        margin-bottom: 0.35rem !important;
      }

      .glass-card .flex.justify-center.gap-3 {
        margin-bottom: 0.35rem !important;
      }

      .glass-card .relative.flex.items-center.justify-center.my-4 {
        margin-top: 0.35rem !important;
        margin-bottom: 0.35rem !important;
      }

      .glass-card form.space-y-3\.5 {
        gap: 0.5rem !important;
      }

        margin-bottom: 0 !important;
      }

        margin-top: 0.35rem !important;
      }
    }

    /* Specific 360x740 height optimization */
    @media (max-height: 750px) and (max-width: 400px) {
      .glass-card>div:last-child {
        padding-top: 0.4rem !important;
        padding-bottom: 0.4rem !important;
      }

      .glass-card .text-center.mb-4 {
        margin-bottom: 0.2rem !important;
      }

      .glass-card .text-2xl {
        font-size: 1.2rem !important;
      }

      .glass-card .flex.justify-center.gap-3 {
        margin-bottom: 0.2rem !important;
      }

      .social-login-btn {
        height: 2.1rem !important;
      }

      .glass-card .relative.flex.items-center.justify-center.my-4 {
        margin-top: 0.2rem !important;
        margin-bottom: 0.2rem !important;
      }

      .glass-card form.space-y-3\.5 {
        gap: 0.4rem !important;
      }

      .glass-card input {

        padding-bottom: 0.4rem !important;
      }

      .glass-card button[type="submit"] {

        padding-bottom: 0.4rem !important;
        margin-top: 0.2rem !important;
      }

      .glass-card .mt-4 {

      }

      .md\:hidden.text-center.mb-5 {
        margin-bottom: 0.2rem !important;
        padding-top: 0 !important;
      }

      .md\:hidden .text-3xl {
        font-size: 1.4rem !important;
      }
    }

    /* Compact desktop heights (min-width: 768px and max-height: 720px) optimization */
    @media (min-width: 768px) and (max-height: 720px) {
      .desktop-compact-hidden {
        display: none !important;
      }

      .desktop-compact-space {
        margin-bottom: 0.4rem !important;
      }

      #left-panel-content {
        padding: 1.5rem !important;
        /* md:p-6 equivalent */
      }

      #right-panel-content {
        padding: 1.5rem !important;
        /* md:p-6 equivalent */

      form.space-y-3.md\:space-y-2,
      form.space-y-3.md\:space-y-2.5 {
        margin-top: 0.4rem !important;
        gap: 0.4rem !important;
      }

      form.space-y-3.md\:space-y-2>div,
      form.space-y-3.md\:space-y-2.5>div {
        margin-bottom: 0 !important;
      }

      .glass-card input {
        padding-top: 0.35rem !important;
        padding-bottom: 0.35rem !important;
        font-size: 0.7rem !important;
      }

      .glass-card label {
        font-size: 0.55rem !important;
        margin-bottom: 0.1rem !important;
      }

      .glass-card button[type="submit"] {
        padding-top: 0.45rem !important;
        padding-bottom: 0.45rem !important;
        margin-top: 0.4rem !important;
      }

      .glass-card .mt-3.md\:mt-2.5 {
        margin-top: 0.4rem !important;
      }
    }

    /* ensure that main container never overflows horizontally */
    body {
      overflow-x: hidden;
    }

    .w-screen {
      width: 100vw;
      overflow-x: hidden;
    }

    /* rtl text alignment for inputs consistent */
    [dir="rtl"] input,
    [dir="rtl"] label,
    [dir="rtl"] button,
    [dir="rtl"] p,
    [dir="rtl"] h2 {
      text-align: right;
    }

    [dir="rtl"] .text-center {
      text-align: center;
    }

    [dir="rtl"] .flex.items-center.justify-between {
      flex-direction: row;
    }

    [dir="rtl"] .me-2 {
      margin-left: 0.5rem;
      margin-right: 0;
    }

    [dir="rtl"] .ms-2 {
      margin-right: 0.5rem;
      margin-left: 0;
    }

    [dir="rtl"] .gap-2 {
      flex-direction: row;
    }

    /* RTL border radius corrections */
    [dir="rtl"] .rounded-l-2xl {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
      border-top-right-radius: 1rem;
      border-bottom-right-radius: 1rem;
    }

    [dir="rtl"] .rounded-r-2xl {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
      border-top-left-radius: 1rem;
      border-bottom-left-radius: 1rem;

    /* Ensure proper tap targets for mobile */
    button,
    a,
    [role="button"] {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Prevent any horizontal scroll */
    .overflow-x-hidden {
      overflow-x: hidden !important;
    }

    * {
      max-width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>

  <div id="toastContainer"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none w-auto max-w-[90vw]"></div>

  <script>
      // Global DOM ready
      (function () {
        // Toast function
        function showToast(message, type = 'success') {
          const container = document.getElementById('toastContainer');
          if (!container) return;
          const toast = document.createElement('div');
          let bgColor = 'bg-emerald-600';
          let icon = '<i class="fas fa-check-circle text-white text-sm"></i>';
          if (type === 'error') { bgColor = 'bg-red-500'; icon = '<i class="fas fa-times-circle text-white text-sm"></i>'; }
          else if (type === 'warning') { bgColor = 'bg-amber-500'; icon = '<i class="fas fa-exclamation-triangle text-white text-sm"></i>'; }
          else if (type === 'info') { bgColor = 'bg-theme-accent'; icon = '<i class="fas fa-info-circle text-white text-sm"></i>'; }
          toast.className = `toast-animation mb-2 px-5 py-3 rounded-xl shadow-lg text-xs sm:text-sm font-medium flex items-center gap-2 pointer-events-auto ${bgColor} text-white max-w-full`;
          toast.innerHTML = `${icon} <span class="break-words">${message}</span>`;
          container.appendChild(toast);
          setTimeout(() => { if (toast && toast.remove) toast.remove(); }, 2600);
        }

        // Password toggle
        const toggleBtn = document.getElementById('togglePasswordBtn');
        const passwordInput = document.getElementById('loginPassword');
        const toggleIcon = document.getElementById('toggleIcon');
        if (toggleBtn && passwordInput) {
          toggleBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
              passwordInput.type = 'text';
              toggleIcon.classList.remove('fa-eye-slash');
              toggleIcon.classList.add('fa-eye');
            } else {
              passwordInput.type = 'password';
              toggleIcon.classList.remove('fa-eye');
              toggleIcon.classList.add('fa-eye-slash');
            }
          });
        }

        // Theme toggle with proper sync
        const themeToggle = document.getElementById('theme-toggle-login');
        const htmlTag = document.documentElement;
        function updateThemeIcons() {
          const isDark = htmlTag.classList.contains('dark');
          const sunIcon = document.querySelector('#theme-toggle-login .fa-sun');
          const moonIcon = document.querySelector('#theme-toggle-login .fa-moon');
          if (sunIcon && moonIcon) {
            if (isDark) {
              sunIcon.classList.add('hidden');
              moonIcon.classList.remove('hidden');
            } else {
              sunIcon.classList.remove('hidden');
              moonIcon.classList.add('hidden');
            }
          }
        }
        function toggleTheme() {
          if (htmlTag.classList.contains('dark')) {
            htmlTag.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            showToast('Light mode activated — cheers!', 'info');
          } else {
            htmlTag.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            showToast('Dark mode activated — smooth vibes', 'info');
          }
          updateThemeIcons();
        }
        if (themeToggle) themeToggle.addEventListener('click', toggleTheme);

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          htmlTag.classList.add('dark');
        } else {
          htmlTag.classList.remove('dark');
        }
        updateThemeIcons();

        // RTL Toggle with full RTL alignment updates
        const rtlToggle = document.getElementById('rtl-toggle-login');
        function applyRTLStyles(isRtl) {
          if (isRtl) {
            htmlTag.setAttribute('dir', 'rtl');
            localStorage.setItem('direction', 'rtl');
          } else {
            htmlTag.removeAttribute('dir');
            localStorage.setItem('direction', 'ltr');
          }
        }
        function toggleRTL() {
          const currentDir = htmlTag.getAttribute('dir');
          if (currentDir === 'rtl') {
            applyRTLStyles(false);
            showToast('LTR layout activated', 'info');
          } else {
            applyRTLStyles(true);
            showToast('RTL layout for Arabic/Hebrew', 'info');
          }
        }
        if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
        if (localStorage.getItem('direction') === 'rtl') {
          htmlTag.setAttribute('dir', 'rtl');
        } else if (localStorage.getItem('direction') === 'ltr') {
          htmlTag.removeAttribute('dir');
        }

        // Remember me logic & form handling
        const savedEmail = localStorage.getItem('savedEmail');
        const rememberCheckbox = document.getElementById('rememberCheckbox');
        const emailInput = document.getElementById('loginEmail');
        if (savedEmail && emailInput) {
          emailInput.value = savedEmail;
          if (rememberCheckbox) rememberCheckbox.checked = true;
        }

        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
          loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email) { showToast('Please enter your email address', 'warning'); return; }
            if (!password) { showToast('Please enter your password', 'warning'); return; }
            if (!email.includes('@') || !email.includes('.')) { showToast('Please enter a valid email address', 'error'); return; }

            if (rememberCheckbox && rememberCheckbox.checked) {
              localStorage.setItem('savedEmail', email);
            } else {
              localStorage.removeItem('savedEmail');
            }
            const userName = email.split('@')[0];
            showToast(`🍸 Welcome back, ${userName}! Your signature cocktail awaits.`, 'success');
          });
        }

        // Social login demo
        document.querySelectorAll('.social-login-btn').forEach(btn => {
          btn.addEventListener('click', () => { showToast('Social login demo — integrate your auth provider', 'info'); });
        });

        // Forgot password demo
        const forgotLink = document.getElementById('forgotPasswordLink');
        if (forgotLink) {
          forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            showToast('Password reset link will be sent to your email', 'info');
          });
        }

        // Additional dynamic fix: On window resize or orientation, ensure no layout overflow
        function adjustFor360() {
          if (window.innerWidth <= 380) {
            const formContainer = document.querySelector('.glass-card .w-full.md\\:w-1\\/2');
            if (formContainer) formContainer.classList.add('px-3');
          } else {
            const formContainer = document.querySelector('.glass-card .w-full.md\\:w-1\\/2');
            if (formContainer) formContainer.classList.remove('px-3');
          }
        }
        window.addEventListener('resize', adjustFor360);
        adjustFor360();
      })();
  </script>
  <style>
    .dark .fa-sun {
      display: none !important;
    }

    .dark .fa-moon {
      display: inline-block !important;
    }

    .fa-moon {
      display: none;
    }

    .fa-sun {
      display: inline-block;
    }

    .hide-scrollbar {
      scrollbar-width: thin;
    }

    [dir="rtl"] .text-left {
      text-align: right;
    }

    [dir="rtl"] .flex.items-center.justify-between {
      flex-direction: row;
    }

    [dir="rtl"] .gap-2 {
      gap: 0.5rem;
    }

    [dir="rtl"] .me-2 {
      margin-left: 0.5rem;
      margin-right: 0;
    }

    [dir="rtl"] .ms-2 {
      margin-right: 0.5rem;
      margin-left: 0;
    }

    [dir="rtl"] .ml-1 {
      margin-right: 0.25rem;
      margin-left: 0;
    }
  </style>
